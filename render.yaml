services:
- type: web
  name: aconselhamento-api
  runtime: python
  buildCommand: pip install -r requirements.txt
  startCommand: gunicorn --workers=1 --bind 0.0.0.0:${PORT:-5000} app:app
  envVars:
    - key: SECRET_KEY
      generateValue: true
  disk:
    name: data
    mountPath: /data
    sizeGB: 1